<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AttendEase</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body{margin:0;padding:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;}
.sidebar{width:220px;min-height:100vh;background:#1e293b;flex-shrink:0;}
.brand{color:#fff;font-weight:700;padding:20px;border-bottom:1px solid #334155;display:block;}
.sidebar a{display:block;color:#94a3b8;text-decoration:none;padding:13px 20px;transition:0.2s;}
.sidebar a:hover,.sidebar a.active{background:#334155;color:#fff;border-left:3px solid #3b82f6;}
.content{flex:1;padding:30px;overflow:auto;}
.card{border-radius:12px;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
</style>
</head>
<body>
<div class="sidebar">
  <span class="brand">📊 AttendEase</span>
  <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><i class="fas fa-home me-2"></i>Dashboard</a>
  <a href="{% url 'students' %}" class="{% if request.resolver_match.url_name == 'students' %}active{% endif %}"><i class="fas fa-users me-2"></i>Students</a>
  <a href="{% url 'mark_attendance' %}" class="{% if request.resolver_match.url_name == 'mark_attendance' %}active{% endif %}"><i class="fas fa-clipboard-check me-2"></i>Mark Attendance</a>
  <a href="{% url 'analytics' %}" class="{% if request.resolver_match.url_name == 'analytics' %}active{% endif %}"><i class="fas fa-chart-pie me-2"></i>Analytics</a>
</div>
<div class="content">
{% if messages %}{% for msg in messages %}
<div class="alert alert-success alert-dismissible fade show"><i class="fas fa-check-circle me-2"></i>{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
{% endfor %}{% endif %}
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
